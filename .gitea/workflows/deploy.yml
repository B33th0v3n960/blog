name: Deploy blog on release
run-name: ${{ gitea.actor }} deploy blog on ${{ gitea.event_name }}

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: node:24-trixie-slim
      options: -v blog-data:/deploy/blog-data
    steps:
      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y rsync

      - name: Check out repository code
        uses: actions/checkout@v4

      - run: npm ci
      - run: npm run build
      - run: echo $RELEASE
      - run: |
          rm -rf /deploy/blog-data/*
          mkdir -p /deploy/blog-data/$RELEASE
          rsync -az --delete dist/ /deploy/blog-data/$RELEASE
